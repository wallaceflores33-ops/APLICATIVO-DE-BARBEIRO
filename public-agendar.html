<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar horário</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0b09; --surface:#1c1712; --gold:#c9974a; --gold-bright:#e6bd7a; --cream:#f1e6d6; --muted:#9c8f79; --line:rgba(201,151,74,0.22); --shadow:0 20px 50px -20px rgba(0,0,0,0.7);}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--cream); font-family:'Fraunces',serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
.box{max-width:460px; width:100%; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:32px; box-shadow:var(--shadow);}
h1,h2{font-family:'Bebas Neue',sans-serif; letter-spacing:.03em;}
.brandmark{font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold-bright); margin-bottom:6px;}
p.lead{color:var(--muted); font-size:14px; margin:0 0 22px;}
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
label{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.07em; color:var(--muted); text-transform:uppercase;}
input,select{background:#14100c; border:1px solid var(--line); border-radius:8px; padding:12px 13px; color:var(--cream); font-family:'Fraunces',serif; font-size:14.5px; outline:none;}
input:focus,select:focus{border-color:var(--gold);}
.btn{width:100%; font-family:'Bebas Neue',sans-serif; letter-spacing:.05em; font-size:17px; padding:14px; border-radius:8px; cursor:pointer; border:none; background:var(--gold); color:#1a1208; margin-top:6px;}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.msg-error{color:#c9603f; font-size:13px; margin:-6px 0 14px;}
.msg-ok{color:#7a9d6f; font-size:14.5px; text-align:center; padding:30px 0;}
.loading{color:var(--muted); text-align:center; padding:40px; font-family:'IBM Plex Mono',monospace; font-size:13px;}
</style>
</head>
<body>
<div class="box" id="box"><div class="loading">Carregando...</div></div>

<script type="module">
const SUPABASE_URL = 'https://xjaviibjsblpceyexjar.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m6g4REQh3Kcpw7YP_tj8lw_B-Dz7LYk';
const FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1/public-booking`;

const box = document.getElementById('box');
const params = new URLSearchParams(location.search);
const slug = params.get('slug');

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }
function fmtMoney(v){ return 'R$ ' + Number(v||0).toFixed(2).replace('.',','); }
function todayISO(){ return new Date().toISOString().slice(0,10); }

async function load(){
  if(!slug){ box.innerHTML = '<p class="msg-error">Link inválido: faltou o parâmetro ?slug= na URL.</p>'; return; }
  try{
    const res = await fetch(`${FUNCTIONS_URL}?slug=${encodeURIComponent(slug)}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    if(!res.ok){ box.innerHTML = `<p class="msg-error">${await res.text()}</p>`; return; }
    const { tenant, servicos, membros } = await res.json();
    renderForm(tenant, servicos, membros);
  } catch(e){
    box.innerHTML = `<p class="msg-error">Erro ao carregar: ${e.message}</p>`;
  }
}

function renderForm(tenant, servicos, membros){
  box.innerHTML = '';
  box.appendChild(el(`<div class="brandmark">${tenant.nome.toUpperCase()}</div><h1 style="font-size:28px; margin:0 0 4px;">Agendar horário</h1><p class="lead">Escolha o profissional, o serviço e o horário.</p>`));
  box.appendChild(el(`<div id="formMsg"></div>`));
  const form = el(`
    <div class="field"><label>Profissional</label><select id="fMembro">${membros.map(m=>`<option value="${m.id}">${m.nome}</option>`).join('')}</select></div>
    <div class="field"><label>Serviço</label><select id="fServico">${servicos.map(s=>`<option value="${s.id}">${s.nome} — ${fmtMoney(s.preco)}</option>`).join('')}</select></div>
    <div class="field"><label>Data</label><input id="fData" type="date" value="${todayISO()}"></div>
    <div class="field"><label>Hora</label><input id="fHora" type="time" value="10:00"></div>
    <div class="field"><label>Seu nome</label><input id="fNome" placeholder="Nome completo"></div>
    <div class="field"><label>WhatsApp</label><input id="fWhats" placeholder="(11) 91234-5678"></div>
  `);
  box.appendChild(form);
  const btn = el(`<button class="btn" id="btnConfirmar">CONFIRMAR AGENDAMENTO</button>`);
  box.appendChild(btn);

  btn.onclick = async ()=>{
    const nome = document.getElementById('fNome').value.trim();
    const whatsapp = document.getElementById('fWhats').value.trim();
    const msg = document.getElementById('formMsg');
    if(!nome || !whatsapp){ msg.innerHTML = '<p class="msg-error">Preenche seu nome e WhatsApp.</p>'; return; }
    btn.disabled = true;
    try{
      const res = await fetch(FUNCTIONS_URL, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({
          slug,
          membro_id: document.getElementById('fMembro').value,
          servico_id: document.getElementById('fServico').value,
          data_hora: `${document.getElementById('fData').value}T${document.getElementById('fHora').value}:00`,
          cliente_nome: nome,
          cliente_whatsapp: whatsapp,
        })
      });
      if(!res.ok){ msg.innerHTML = `<p class="msg-error">${await res.text()}</p>`; btn.disabled=false; return; }
      box.innerHTML = '<p class="msg-ok">Agendamento confirmado! ✂️<br>A barbearia já recebeu seus dados.</p>';
    } catch(e){
      msg.innerHTML = `<p class="msg-error">Erro: ${e.message}</p>`; btn.disabled=false;
    }
  };
}

load();
</script>
</body>
</html>
