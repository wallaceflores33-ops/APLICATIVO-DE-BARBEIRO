<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Fácil — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0b09; --bg-2:#14100c; --sidebar:#100c0a;
  --surface:#1c1712; --surface-2:#241e17;
  --gold:#c9974a; --gold-bright:#e6bd7a;
  --crimson:#8c2f2f; --crimson-bright:#b64545;
  --cream:#f1e6d6; --muted:#9c8f79; --line:rgba(201,151,74,0.20);
  --ok:#7a9d6f; --shadow:0 20px 50px -20px rgba(0,0,0,0.7);
}
*{box-sizing:border-box;}
html,body{margin:0; padding:0;}
body{background:radial-gradient(ellipse 900px 500px at 100% -10%, rgba(201,151,74,0.08), transparent 55%), var(--bg); color:var(--cream); font-family:'Fraunces',serif; min-height:100vh;}
h1,h2,h3{font-family:'Bebas Neue',sans-serif; letter-spacing:.03em;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:var(--gold-bright);}
.login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center;}
.login-box{max-width:440px; width:100%; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:36px; box-shadow:var(--shadow); animation:fadeUp .5s ease both;}
.brandmark{display:flex; align-items:center; gap:10px; margin-bottom:20px;}
.brandmark .name{font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--gold-bright); letter-spacing:.05em;}
.login-box h2{font-size:30px; margin:0 0 4px;}
.login-box p{color:var(--muted); font-size:14px; margin:0 0 22px;}
.tabs{display:flex; gap:8px; margin-bottom:20px;}
.tab{flex:1; text-align:center; padding:10px; border-radius:8px; border:1px solid var(--line); cursor:pointer; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12.5px;}
.tab.active{border-color:var(--gold); color:var(--gold-bright); background:rgba(201,151,74,0.08);}
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
label{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.07em; color:var(--muted); text-transform:uppercase;}
input,select,textarea{background:var(--bg-2); border:1px solid var(--line); border-radius:8px; padding:12px 13px; color:var(--cream); font-family:'Fraunces',serif; font-size:14.5px; outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
.btn{font-family:'Bebas Neue',sans-serif; letter-spacing:.05em; font-size:16px; padding:13px 22px; border-radius:7px; cursor:pointer; border:2px solid transparent;}
.btn-primary{background:var(--gold); color:#1a1208;}
.btn-outline{background:transparent; border-color:var(--line); color:var(--cream);}
.btn-danger{background:var(--crimson); color:var(--cream);}
.btn-sm{font-size:12.5px; padding:7px 12px; border-radius:6px;}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.msg-error{color:var(--crimson-bright); font-size:13px; margin:-8px 0 14px;}
.msg-ok{color:var(--ok); font-size:13px; margin:-8px 0 14px;}
.footnote{margin-top:16px; color:var(--muted); font-size:11.5px; font-family:'IBM Plex Mono',monospace; opacity:.8;}
.shell{display:flex; min-height:100vh;}
.sidebar{width:238px; flex-shrink:0; background:var(--sidebar); border-right:1px solid var(--line); display:flex; flex-direction:column; padding:24px 0; position:sticky; top:0; height:100vh;}
.sidebar .brandmark{padding:0 22px 22px; border-bottom:1px solid var(--line); margin:0 0 14px;}
.nav-item{display:flex; align-items:center; gap:12px; padding:12px 22px; color:var(--muted); cursor:pointer; font-size:14.5px; border-left:3px solid transparent;}
.nav-item .ic{font-size:16px; width:20px; text-align:center;}
.nav-item.active{color:var(--gold-bright); border-left-color:var(--gold); background:rgba(201,151,74,0.09);}
.nav-spacer{flex:1;}
.nav-item.logout{border-top:1px solid var(--line); margin-top:8px; padding-top:16px;}
.main{flex:1; padding:30px 36px 60px;}
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; flex-wrap:wrap; gap:14px;}
.topbar h1{font-size:32px; margin:0;}
.trial-chip{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold-bright); border:1px solid var(--line); padding:7px 13px; border-radius:999px;}
.trial-chip.locked{color:var(--crimson-bright); border-color:var(--crimson-bright);}
.kpi-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; margin-bottom:26px;}
.kpi-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:18px 20px;}
.kpi-card .lbl{color:var(--muted); font-size:12.5px; margin-bottom:8px;}
.kpi-card .val{font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold-bright);}
.panel{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:22px; margin-bottom:20px;}
.panel-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.panel-head h3{font-size:15px; font-family:'Fraunces',serif; font-weight:600; margin:0;}
table{width:100%; border-collapse:collapse; font-size:14px;}
th{text-align:left; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.05em; text-transform:uppercase; padding:10px 12px; border-bottom:1px solid var(--line);}
td{padding:12px; border-bottom:1px solid var(--line);}
tr:last-child td{border-bottom:none;}
.badge{font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:3px 9px; border-radius:999px; border:1px solid var(--ok); color:var(--ok);}
.badge.warn{border-color:var(--gold); color:var(--gold-bright);}
.badge.off{border-color:var(--muted); color:var(--muted);}
.badge.danger{border-color:var(--crimson-bright); color:var(--crimson-bright);}
.row-actions{display:flex; gap:8px;}
.empty{color:var(--muted); text-align:center; padding:36px; border:1px dashed var(--line); border-radius:10px;}
.modal-overlay{position:fixed; inset:0; background:rgba(8,6,4,.72); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:300; padding:20px;}
.modal{background:var(--surface-2); border:1px solid var(--gold); border-radius:14px; padding:28px; max-width:460px; width:100%; box-shadow:var(--shadow); max-height:88vh; overflow:auto;}
.modal h3{font-size:24px; margin:0 0 18px; color:var(--gold-bright);}
.modal-actions{display:flex; gap:10px; margin-top:18px; justify-content:flex-end;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.form-grid .full{grid-column:1/-1;}
.link-box{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.link-box .url{font-family:'IBM Plex Mono',monospace; color:var(--gold-bright); font-size:13.5px; word-break:break-all;}
.paywall{background:linear-gradient(160deg, rgba(140,47,47,0.14), var(--surface)); border:1px solid var(--crimson-bright); border-radius:14px; padding:30px; text-align:center; margin-bottom:24px;}
.paywall h3{font-size:28px; margin:0 0 8px;}
.paywall p{color:var(--muted); max-width:440px; margin:0 auto 18px; font-size:14.5px;}
@keyframes fadeUp{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);}}
@media (max-width:860px){
  .shell{flex-direction:column;} .sidebar{width:100%; height:auto; flex-direction:row; overflow-x:auto; position:relative; padding:12px;}
  .sidebar .brandmark{display:none;} .nav-item{padding:10px 14px; border-left:none; border-bottom:3px solid transparent; white-space:nowrap;}
  .nav-item.active{border-bottom-color:var(--gold);} .nav-spacer{display:none;}
  .kpi-grid,.form-grid{grid-template-columns:1fr;} .main{padding:20px;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ================= CONFIGURAÇÃO DO SEU PROJETO =================
const SUPABASE_URL = 'https://xjaviibjsblpceyexjar.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m6g4REQh3Kcpw7YP_tj8lw_B-Dz7LYk';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const root = document.getElementById('root');
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstElementChild; }
function appendHTML(parent, html){ const d=document.createElement('div'); d.innerHTML=html.trim(); while(d.firstChild) parent.appendChild(d.firstChild); }
function fmtMoney(v){ return 'R$ ' + Number(v||0).toFixed(2).replace('.',','); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function slugify(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }

const state = {
  session:null, tenant:null, membro:null, view:'dashboard',
  membros:[], servicos:[], disponibilidade:[], clientes:[], agendamentos:[], lancamentos:[],
};
const DOW = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

const NAV = [
  {key:'dashboard', label:'Dashboard', ic:'▦'},
  {key:'servicos', label:'Serviços', ic:'✂'},
  {key:'equipe', label:'Equipe', ic:'👥'},
  {key:'disponibilidade', label:'Disponibilidade', ic:'🕐'},
  {key:'agendamentos', label:'Agendamentos', ic:'📅'},
  {key:'clientes', label:'Clientes', ic:'👤'},
  {key:'financeiro', label:'Financeiro', ic:'💰'},
  {key:'linkpublico', label:'Link Público', ic:'🔗'},
  {key:'configuracoes', label:'Configurações', ic:'⚙'},
];

function isLocked(){ return state.tenant?.status==='trial' && state.agendamentos.length >= (state.tenant?.trial_limit||5); }

// ================= BOOT =================
async function boot(){
  const { data:{ session } } = await supabase.auth.getSession();
  state.session = session;
  if(session){ await loadTenant(); }
  render();
}
supabase.auth.onAuthStateChange((_event, session)=>{ state.session = session; });

async function loadTenant(){
  const { data: membro } = await supabase.from('membros').select('*').eq('user_id', state.session.user.id).maybeSingle();
  if(!membro){ state.membro=null; state.tenant=null; return; }
  state.membro = membro;
  const { data: tenant } = await supabase.from('tenants').select('*').eq('id', membro.tenant_id).single();
  state.tenant = tenant;
  await loadAllData();
}

async function loadAllData(){
  const tid = state.tenant.id;
  const [srv, mem, disp, cli, ag, lan] = await Promise.all([
    supabase.from('servicos').select('*').eq('tenant_id', tid),
    supabase.from('membros').select('*').eq('tenant_id', tid),
    supabase.from('disponibilidade').select('*').eq('tenant_id', tid),
    supabase.from('clientes').select('*').eq('tenant_id', tid),
    supabase.from('agendamentos').select('*').eq('tenant_id', tid).order('data_hora', {ascending:false}),
    supabase.from('lancamentos_financeiros').select('*').eq('tenant_id', tid).order('data', {ascending:false}),
  ]);
  state.servicos = srv.data || [];
  state.membros = mem.data || [];
  state.disponibilidade = disp.data || [];
  state.clientes = cli.data || [];
  state.agendamentos = ag.data || [];
  state.lancamentos = lan.data || [];
}

// ================= RENDER ROOT =================
function render(){
  root.innerHTML='';
  if(!state.session) return renderAuth();
  if(!state.tenant) return renderSetup();
  renderShell();
}

// ================= AUTH (login / criar conta) =================
function renderAuth(){
  const wrap = el(`<div class="login-wrap"><div class="login-box">
    <div class="brandmark">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M6 4L18 16M14 4L6 16" stroke="#c9974a" stroke-width="1.6" stroke-linecap="round"/><circle cx="5" cy="18" r="2.2" stroke="#e6bd7a" stroke-width="1.4"/><circle cx="19" cy="18" r="2.2" stroke="#e6bd7a" stroke-width="1.4"/></svg>
      <span class="name">AGENDA FÁCIL</span>
    </div>
    <div class="tabs">
      <div class="tab active" id="tabLogin">Entrar</div>
      <div class="tab" id="tabSignup">Criar conta</div>
    </div>
    <div id="authBody"></div>
  </div></div>`);
  root.appendChild(wrap);
  const body = wrap.querySelector('#authBody');
  const tabLogin = wrap.querySelector('#tabLogin');
  const tabSignup = wrap.querySelector('#tabSignup');

  function showLogin(){
    tabLogin.classList.add('active'); tabSignup.classList.remove('active');
    body.innerHTML='';
    appendHTML(body, `
      <h2 style="font-size:28px;">Entrar</h2>
      <p>Acesse o painel da sua barbearia.</p>
      <div id="authMsg"></div>
      <div class="field"><label>E-mail</label><input id="lEmail" type="email"></div>
      <div class="field"><label>Senha</label><input id="lSenha" type="password"></div>
      <button class="btn btn-primary" style="width:100%;" id="btnLogin">ENTRAR</button>
    `);
    body.querySelector('#btnLogin').onclick = async ()=>{
      const email = body.querySelector('#lEmail').value.trim();
      const password = body.querySelector('#lSenha').value.trim();
      if(!email || !password){ showMsg('Preenche e-mail e senha.'); return; }
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if(error){ showMsg(error.message); return; }
      state.session = data.session;
      await loadTenant();
      render();
    };
  }
  function showSignup(){
    tabSignup.classList.add('active'); tabLogin.classList.remove('active');
    body.innerHTML='';
    appendHTML(body, `
      <h2 style="font-size:28px;">Criar conta</h2>
      <p>Cria seu login e sua barbearia no Agenda Fácil.</p>
      <div id="authMsg"></div>
      <div class="field"><label>Seu nome</label><input id="sNome"></div>
      <div class="field"><label>Nome da barbearia</label><input id="sBarbearia"></div>
      <div class="field"><label>E-mail</label><input id="sEmail" type="email"></div>
      <div class="field"><label>Senha</label><input id="sSenha" type="password" placeholder="mín. 6 caracteres"></div>
      <button class="btn btn-primary" style="width:100%;" id="btnSignup">CRIAR CONTA</button>
      <div class="footnote">Dependendo da configuração do projeto, o Supabase pode pedir confirmação por e-mail antes de liberar o login.</div>
    `);
    body.querySelector('#btnSignup').onclick = async ()=>{
      const nome = body.querySelector('#sNome').value.trim();
      const barbearia = body.querySelector('#sBarbearia').value.trim();
      const email = body.querySelector('#sEmail').value.trim();
      const password = body.querySelector('#sSenha').value.trim();
      if(!nome || !barbearia || !email || !password){ showMsg('Preenche todos os campos.'); return; }
      const { data, error } = await supabase.auth.signUp({ email, password });
      if(error){ showMsg(error.message); return; }
      if(!data.session){
        showMsg('Conta criada! Confirma seu e-mail (chegou uma mensagem do Supabase) e depois volta aqui pra entrar.', true);
        return;
      }
      state.session = data.session;
      const slugBase = slugify(barbearia) || 'barbearia';
      const { error: rpcErr } = await supabase.rpc('criar_tenant_e_dono', {
        p_nome_barbearia: barbearia, p_slug: slugBase + '-' + Math.random().toString(36).slice(2,6), p_nome_usuario: nome
      });
      if(rpcErr){ showMsg(rpcErr.message); return; }
      await loadTenant();
      render();
    };
  }
  function showMsg(text, ok){
    const m = body.querySelector('#authMsg');
    m.innerHTML = `<div class="${ok?'msg-ok':'msg-error'}">${text}</div>`;
  }
  tabLogin.onclick = showLogin; tabSignup.onclick = showSignup;
  showLogin();
}

// tela de recuperação: sessão existe mas ainda não tem tenant (ex: confirmou e-mail sem ter rodado o rpc)
function renderSetup(){
  const wrap = el(`<div class="login-wrap"><div class="login-box">
    <div class="brandmark"><span class="name">AGENDA FÁCIL</span></div>
    <h2 style="font-size:26px;">Finaliza o cadastro da sua barbearia</h2>
    <p>Sua conta de login já existe — só falta criar sua barbearia.</p>
    <div id="setupMsg"></div>
    <div class="field"><label>Seu nome</label><input id="stNome"></div>
    <div class="field"><label>Nome da barbearia</label><input id="stBarbearia"></div>
    <button class="btn btn-primary" style="width:100%;" id="btnSetup">CRIAR MINHA BARBEARIA</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px;" id="btnLogoutSetup">sair</button>
  </div></div>`);
  root.appendChild(wrap);
  wrap.querySelector('#btnLogoutSetup').onclick = async ()=>{ await supabase.auth.signOut(); state.session=null; render(); };
  wrap.querySelector('#btnSetup').onclick = async ()=>{
    const nome = wrap.querySelector('#stNome').value.trim();
    const barbearia = wrap.querySelector('#stBarbearia').value.trim();
    const msg = wrap.querySelector('#setupMsg');
    if(!nome || !barbearia){ msg.innerHTML='<div class="msg-error">Preenche os dois campos.</div>'; return; }
    const slugBase = slugify(barbearia) || 'barbearia';
    const { error } = await supabase.rpc('criar_tenant_e_dono', {
      p_nome_barbearia: barbearia, p_slug: slugBase + '-' + Math.random().toString(36).slice(2,6), p_nome_usuario: nome
    });
    if(error){ msg.innerHTML=`<div class="msg-error">${error.message}</div>`; return; }
    await loadTenant();
    render();
  };
}

// ================= SHELL =================
function renderShell(){
  const shell = el(`<div class="shell"></div>`);
  const sidebar = el(`<div class="sidebar">
    <div class="brandmark"><span class="name">AGENDA FÁCIL</span></div>
  </div>`);
  NAV.forEach(n=>{
    const item = el(`<div class="nav-item ${state.view===n.key?'active':''}"><span class="ic">${n.ic}</span>${n.label}</div>`);
    item.onclick = ()=>{ state.view=n.key; render(); };
    sidebar.appendChild(item);
  });
  sidebar.appendChild(el(`<div class="nav-spacer"></div>`));
  const logout = el(`<div class="nav-item logout"><span class="ic">↩</span>Sair</div>`);
  logout.onclick = async ()=>{ await supabase.auth.signOut(); state.session=null; state.tenant=null; render(); };
  sidebar.appendChild(logout);
  shell.appendChild(sidebar);

  const main = el(`<div class="main"></div>`);
  main.appendChild(el(`<div class="topbar">
    <h1>${NAV.find(n=>n.key===state.view).label}</h1>
    <div class="trial-chip ${isLocked()?'locked':''}">${isLocked() ? '🔒 teste esgotado' : (state.tenant.status==='trial' ? `teste: ${state.agendamentos.length}/${state.tenant.trial_limit} agendamentos` : '✓ plano ativo')}</div>
  </div>`));
  const body = el(`<div id="viewBody"></div>`);
  main.appendChild(body);
  shell.appendChild(main);
  root.appendChild(shell);

  const renderers = {
    dashboard:renderDashboard, servicos:renderServicos, equipe:renderEquipe,
    disponibilidade:renderDisponibilidade, agendamentos:renderAgendamentos,
    clientes:renderClientes, financeiro:renderFinanceiro,
    linkpublico:renderLinkPublico, configuracoes:renderConfiguracoes,
  };
  renderers[state.view](body);
}

// ================= MODAL GENÉRICO =================
function openModal(title, fields, onSubmit, opts={}){
  const overlay = el(`<div class="modal-overlay"><div class="modal"><h3>${title}</h3><div class="form-grid" id="mFields"></div><div id="mErr"></div><div class="modal-actions"></div></div></div>`);
  const fWrap = overlay.querySelector('#mFields');
  fields.forEach(f=>{
    const wrap = el(`<div class="field ${f.full?'full':''}"><label>${f.label}</label></div>`);
    let input;
    if(f.type==='select'){ input = el(`<select id="f_${f.key}">${f.options.map(o=>`<option value="${o.value}" ${o.value==f.value?'selected':''}>${o.label}</option>`).join('')}</select>`); }
    else if(f.type==='textarea'){ input = el(`<textarea id="f_${f.key}">${f.value||''}</textarea>`); }
    else { input = el(`<input id="f_${f.key}" type="${f.type||'text'}" value="${f.value!=null?f.value:''}">`); }
    wrap.appendChild(input); fWrap.appendChild(wrap);
  });
  const actions = overlay.querySelector('.modal-actions');
  const cancel = el(`<button class="btn btn-outline">CANCELAR</button>`);
  cancel.onclick = ()=>overlay.remove();
  const submit = el(`<button class="btn btn-primary">${opts.submitLabel||'SALVAR'}</button>`);
  submit.onclick = async ()=>{
    const values={}; fields.forEach(f=>{ values[f.key]=document.getElementById('f_'+f.key).value; });
    submit.disabled = true;
    const err = await onSubmit(values);
    submit.disabled = false;
    if(err){ overlay.querySelector('#mErr').innerHTML = `<div class="msg-error">${err}</div>`; return; }
    overlay.remove();
  };
  actions.appendChild(cancel); actions.appendChild(submit);
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

// ================= DASHBOARD =================
function renderDashboard(body){
  const now = new Date();
  const concluidos = state.agendamentos.filter(a=>a.status==='concluido');
  const hojeStr = todayISO();
  const faturamentoHoje = concluidos.filter(a=>a.data_hora.slice(0,10)===hojeStr).reduce((s,a)=>s+Number(a.valor),0);
  const mesAtual = now.toISOString().slice(0,7);
  const doMes = concluidos.filter(a=>a.data_hora.slice(0,7)===mesAtual);
  const faturamentoMes = doMes.reduce((s,a)=>s+Number(a.valor),0);
  const ticketMedio = doMes.length ? faturamentoMes/doMes.length : 0;

  body.appendChild(el(`<div class="kpi-grid">
    <div class="kpi-card"><div class="lbl">Faturamento Hoje</div><div class="val">${fmtMoney(faturamentoHoje)}</div></div>
    <div class="kpi-card"><div class="lbl">Faturamento do Mês</div><div class="val">${fmtMoney(faturamentoMes)}</div></div>
    <div class="kpi-card"><div class="lbl">Atendimentos (mês)</div><div class="val">${doMes.length}</div></div>
    <div class="kpi-card"><div class="lbl">Ticket Médio</div><div class="val">${fmtMoney(ticketMedio)}</div></div>
  </div>`));

  if(isLocked()){
    const pw = el(`<div class="paywall"><h3>Seu teste grátis acabou</h3>
      <p>Você já usou os ${state.tenant.trial_limit} agendamentos gratuitos. Assine pra continuar.</p>
      <button class="btn btn-danger" id="pwBtn">ASSINAR VIA GREENN</button></div>`);
    pw.querySelector('#pwBtn').onclick = greennExplain;
    body.appendChild(pw);
  }

  const proximos = state.agendamentos.filter(a=>a.status==='confirmado' && a.data_hora >= new Date().toISOString())
    .sort((a,b)=>a.data_hora.localeCompare(b.data_hora)).slice(0,5);
  const panel = el(`<div class="panel"><div class="panel-head"><h3>Próximos agendamentos</h3><a href="#" id="verTodos">Ver todos →</a></div></div>`);
  panel.querySelector('#verTodos').onclick=(e)=>{ e.preventDefault(); state.view='agendamentos'; render(); };
  if(proximos.length===0){ panel.appendChild(el(`<div class="empty">Nenhum agendamento próximo.</div>`)); }
  else {
    proximos.forEach(a=>{
      const cli = state.clientes.find(c=>c.id===a.cliente_id);
      const serv = state.servicos.find(s=>s.id===a.servico_id);
      panel.appendChild(el(`<div style="padding:10px 0; border-bottom:1px dashed var(--line); font-size:14px;">${cli?cli.nome:'Cliente'} · ${serv?serv.nome:''} · ${a.data_hora.replace('T',' ').slice(0,16)}</div>`));
    });
  }
  body.appendChild(panel);
}
function greennExplain(){
  alert('Em produção: este botão abre o checkout da Greenn. O webhook (já publicado no Supabase) recebe a confirmação de pagamento e libera a conta automaticamente.');
}

// ================= SERVIÇOS =================
function renderServicos(body){
  const panel = el(`<div class="panel"><div class="panel-head"><h3>Serviços</h3></div></div>`);
  const addBtn = el(`<button class="btn btn-primary btn-sm">+ NOVO SERVIÇO</button>`);
  panel.querySelector('.panel-head').appendChild(addBtn);
  addBtn.onclick = ()=> openModal('Novo serviço', [
    {key:'nome', label:'Nome'}, {key:'duracao', label:'Duração (min)', type:'number', value:30}, {key:'preco', label:'Preço (R$)', type:'number', value:0},
  ], async (v)=>{
    if(!v.nome) return 'Dá um nome pro serviço.';
    const { error } = await supabase.from('servicos').insert({ tenant_id: state.tenant.id, nome:v.nome, duracao_minutos:Number(v.duracao)||0, preco:Number(v.preco)||0 });
    if(error) return error.message;
    await loadAllData(); render();
  });

  if(state.servicos.length===0){ panel.appendChild(el(`<div class="empty">Nenhum serviço cadastrado ainda.</div>`)); }
  else {
    const tbl = el(`<table><thead><tr><th>Nome</th><th>Duração</th><th>Preço</th><th></th></tr></thead><tbody></tbody></table>`);
    const tbody = tbl.querySelector('tbody');
    state.servicos.forEach(s=>{
      const tr = el(`<tr><td>${s.nome}</td><td>${s.duracao_minutos} min</td><td>${fmtMoney(s.preco)}</td><td class="row-actions"></td></tr>`);
      const del = el(`<button class="btn btn-outline btn-sm">excluir</button>`);
      del.onclick = async ()=>{ await supabase.from('servicos').delete().eq('id', s.id); await loadAllData(); render(); };
      tr.querySelector('.row-actions').appendChild(del);
      tbody.appendChild(tr);
    });
    panel.appendChild(tbl);
  }
  body.appendChild(panel);
}

// ================= EQUIPE =================
function renderEquipe(body){
  const panel = el(`<div class="panel"><div class="panel-head"><h3>Equipe</h3></div></div>`);
  const addBtn = el(`<button class="btn btn-primary btn-sm">+ NOVO MEMBRO</button>`);
  panel.querySelector('.panel-head').appendChild(addBtn);
  addBtn.onclick = ()=> openModal('Novo membro da equipe', [
    {key:'nome', label:'Nome'}, {key:'especialidade', label:'Especialidade'},
  ], async (v)=>{
    if(!v.nome) return 'Dá um nome.';
    const { error } = await supabase.rpc('adicionar_membro', { p_tenant_id: state.tenant.id, p_nome: v.nome, p_especialidade: v.especialidade||'' });
    if(error) return error.message;
    await loadAllData(); render();
  });

  const tbl = el(`<table><thead><tr><th>Nome</th><th>Especialidade</th><th>Status</th><th></th></tr></thead><tbody></tbody></table>`);
  const tbody = tbl.querySelector('tbody');
  state.membros.forEach(m=>{
    const tr = el(`<tr><td>${m.nome}</td><td>${m.especialidade||'—'}</td><td><span class="badge ${m.ativo?'':'off'}">${m.ativo?'ativo':'inativo'}</span></td><td class="row-actions"></td></tr>`);
    const toggle = el(`<button class="btn btn-outline btn-sm">${m.ativo?'desativar':'ativar'}</button>`);

// ================= DISPONIBILIDADE =================
function renderDisponibilidade(body){
  const panel = el(`<div class="panel"><div class="panel-head"><h3>Disponibilidade</h3></div></div>`);
  const addBtn = el(`<button class="btn btn-primary btn-sm">+ NOVO HORÁRIO</button>`);
  panel.querySelector('.panel-head').appendChild(addBtn);
  addBtn.onclick = ()=>{
    if(state.membros.length===0){ alert('Cadastre um membro da equipe primeiro.'); return; }
    openModal('Novo horário', [
      {key:'membro_id', label:'Profissional', type:'select', options: state.membros.map(m=>({value:m.id,label:m.nome}))},
      {key:'dia_semana', label:'Dia da semana', type:'select', options: DOW.map((d,i)=>({value:i,label:d}))},
      {key:'hora_inicio', label:'Início', type:'time', value:'09:00'},
      {key:'hora_fim', label:'Fim', type:'time', value:'18:00'},
    ], async (v)=>{
      const { error } = await supabase.from('disponibilidade').insert({ tenant_id: state.tenant.id, membro_id:v.membro_id, dia_semana:Number(v.dia_semana), hora_inicio:v.hora_inicio, hora_fim:v.hora_fim });
      if(error) return error.message;
      await loadAllData(); render();
    });
  };
  if(state.disponibilidade.length===0){ panel.appendChild(el(`<div class="empty">Nenhuma disponibilidade cadastrada.</div>`)); }
  else {
    const tbl = el(`<table><thead><tr><th>Profissional</th><th>Dia</th><th>Horário</th><th></th></tr></thead><tbody></tbody></table>`);
    const tbody = tbl.querySelector('tbody');
    state.disponibilidade.forEach(d=>{
      const m = state.membros.find(x=>x.id===d.membro_id);
      const tr = el(`<tr><td>${m?m.nome:'—'}</td><td>${DOW[d.dia_semana]}</td><td>${d.hora_inicio} — ${d.hora_fim}</td><td class="row-actions"></td></tr>`);
      const del = el(`<button class="btn btn-outline btn-sm">excluir</button>`);
      del.onclick = async ()=>{ await supabase.from('disponibilidade').delete().eq('id', d.id); await loadAllData(); render(); };
      tr.querySelector('.row-actions').appendChild(del);
      tbody.appendChild(tr);
    });
    panel.appendChild(tbl);
  }
  body.appendChild(panel);
}

// ================= AGENDAMENTOS =================
function renderAgendamentos(body){
  const panel = el(`<div class="panel"><div class="panel-head"><h3>Agendamentos</h3></div></div>`);
  const addBtn = el(`<button class="btn btn-primary btn-sm" ${isLocked()?'disabled':''}>+ NOVO AGENDAMENTO</button>`);
  panel.querySelector('.panel-head').appendChild(addBtn);
  addBtn.onclick = ()=>{
    if(state.membros.length===0 || state.servicos.length===0){ alert('Cadastre ao menos um membro da equipe e um serviço primeiro.'); return; }
    openModal('Novo agendamento', [
      {key:'membro_id', label:'Profissional', type:'select', options: state.membros.map(m=>({value:m.id,label:m.nome}))},
      {key:'servico_id', label:'Serviço', type:'select', options: state.servicos.map(s=>({value:s.id,label:`${s.nome} — ${fmtMoney(s.preco)}`}))},
      {key:'cliente_nome', label:'Nome do cliente'},
      {key:'cliente_whats', label:'WhatsApp do cliente'},
      {key:'data', label:'Data', type:'date', value: todayISO()},
      {key:'hora', label:'Hora', type:'time', value:'09:00'},
    ], async (v)=>{
      if(!v.cliente_nome || !v.cliente_whats) return 'Preenche nome e WhatsApp do cliente.';
      let { data: cliente } = await supabase.from('clientes').select('*').eq('tenant_id', state.tenant.id).eq('whatsapp', v.cliente_whats).maybeSingle();
      if(!cliente){
        const { data: novo, error } = await supabase.from('clientes').insert({ tenant_id: state.tenant.id, nome:v.cliente_nome, whatsapp:v.cliente_whats }).select().single();
        if(error) return error.message;
        cliente = novo;
      }
      const serv = state.servicos.find(s=>s.id===v.servico_id);
      const { error } = await supabase.from('agendamentos').insert({ tenant_id: state.tenant.id, membro_id:v.membro_id, servico_id:v.servico_id, cliente_id:cliente.id, data_hora:`${v.data}T${v.hora}:00`, status:'confirmado', valor:serv.preco });
      if(error) return error.message;
      await loadTenant(); render();
    });
  };

  if(state.agendamentos.length===0){ panel.appendChild(el(`<div class="empty">Nenhum agendamento ainda.</div>`)); }
  else {
    const tbl = el(`<table><thead><tr><th>Cliente</th><th>Serviço</th><th>Profissional</th><th>Data/Hora</th><th>Status</th><th></th></tr></thead><tbody></tbody></table>`);
    const tbody = tbl.querySelector('tbody');
    state.agendamentos.forEach(a=>{
      const cli = state.clientes.find(c=>c.id===a.cliente_id);
      const serv = state.servicos.find(s=>s.id===a.servico_id);
      const mem = state.membros.find(m=>m.id===a.membro_id);
      const badgeClass = a.status==='confirmado'?'warn':(a.status==='concluido'?'':'danger');
      const tr = el(`<tr><td>${cli?cli.nome:'—'}</td><td>${serv?serv.nome:'—'}</td><td>${mem?mem.nome:'—'}</td><td>${a.data_hora.replace('T',' ').slice(0,16)}</td><td><span class="badge ${badgeClass}">${a.status}</span></td><td class="row-actions"></td></tr>`);
      const actions = tr.querySelector('.row-actions');
      if(a.status==='confirmado'){
        const done = el(`<button class="btn btn-outline btn-sm">concluir</button>`);
        done.onclick = async ()=>{ await supabase.from('agendamentos').update({status:'concluido'}).eq('id', a.id); await loadAllData(); render(); };
        const cancel = el(`<button class="btn btn-outline btn-sm">cancelar</button>`);
        cancel.onclick = async ()=>{ await supabase.from('agendamentos').update({status:'cancelado'}).eq('id', a.id); await loadAllData(); render(); };
        actions.appendChild(done); actions.appendChild(cancel);
      }
      const msg = el(`<button class="btn btn-outline btn-sm">msg</button>`);
      msg.onclick = ()=> openMessageModal(a, cli, serv);
      actions.appendChild(msg);
      tbody.appendChild(tr);
    });
    panel.appendChild(tbl);
  }
  body.appendChild(panel);
}
function openMessageModal(a, cli, serv){
  if(!cli){ alert('Sem cliente vinculado.'); return; }
  const overlay = el(`<div class="modal-overlay"><div class="modal">
    <h3>Falar com ${cli.nome}</h3>
    <div class="field"><label>Mensagem</label><textarea id="msgText" style="min-height:110px;">Olá ${cli.nome}! Confirmando seu horário de ${serv?serv.nome:'serviço'} dia ${a.data_hora.replace('T',' ').slice(0,16)}. Até lá!</textarea></div>
    <div class="modal-actions"><button class="btn btn-outline" id="closeM">CANCELAR</button><button class="btn btn-primary" id="sendM">ENVIAR NO WHATSAPP</button></div>
  </div></div>`);
  document.body.appendChild(overlay);
  overlay.querySelector('#closeM').onclick = ()=>overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  overlay.querySelector('#sendM').onclick = ()=>{
    const text = overlay.querySelector('#msgText').value;
    const digits = cli.whatsapp.replace(/\D/g,''); const withCountry = digits.startsWith('55') ? digits : '55'+digits;
    window.open(`https://wa.me/${withCountry}?text=${encodeURIComponent(text)}`, '_blank');
    overlay.remove();
  };
}

// ================= CLIENTES =================
function renderClientes(body){
  const panel = el(`<div class="panel"><div class="panel-head"><h3>Clientes</h3></div></div>`);
  const addBtn = el(`<button class="btn btn-primary btn-sm">+ NOVO CLIENTE</button>`);
  panel.querySelector('.panel-head').appendChild(addBtn);
  addBtn.onclick = ()=> openModal('Novo cliente', [
    {key:'nome', label:'Nome'}, {key:'whatsapp', label:'WhatsApp'}, {key:'email', label:'E-mail (opcional)'},
  ], async (v)=>{
    if(!v.nome || !v.whatsapp) return 'Preenche nome e WhatsApp.';
    const { error } = await supabase.from('clientes').insert({ tenant_id: state.tenant.id, nome:v.nome, whatsapp:v.whatsapp, email:v.email||null });
    if(error) return error.message;
    await loadAllData(); render();
  });

  if(state.clientes.length===0){ panel.appendChild(el(`<div class="empty">Nenhum cliente cadastrado ainda.</div>`)); }
  else {
    const tbl = el(`<table><thead><tr><th>Nome</th><th>WhatsApp</th><th>Agendamentos</th><th></th></tr></thead><tbody></tbody></table>`);
    const tbody = tbl.querySelector('tbody');
    state.clientes.forEach(c=>{
      const total = state.agendamentos.filter(a=>a.cliente_id===c.id).length;
      const tr = el(`<tr><td>${c.nome}</td><td class="mono">${c.whatsapp}</td><td>${total}</td><td class="row-actions"></td></tr>`);
      const del = el(`<button class="btn btn-outline btn-sm">excluir</button>`);
      del.onclick = async ()=>{ await supabase.from('clientes').delete().eq('id', c.id); await loadAllData(); render(); };
      tr.querySelector('.row-actions').appendChild(del);
      tbody.appendChild(tr);
    });
    panel.appendChild(tbl);
  }
  body.appendChild(panel);
}

// ================= FINANCEIRO =================
function renderFinanceiro(body){
  const totalEntradas = state.lancamentos.filter(l=>l.tipo==='entrada').reduce((s,l)=>s+Number(l.valor),0);
  const totalSaidas = state.lancamentos.filter(l=>l.tipo==='saida').reduce((s,l)=>s+Number(l.valor),0);
  body.appendChild(el(`<div class="kpi-grid">
    <div class="kpi-card"><div class="lbl">Entradas</div><div class="val">${fmtMoney(totalEntradas)}</div></div>
    <div class="kpi-card"><div class="lbl">Saídas</div><div class="val">${fmtMoney(totalSaidas)}</div></div>
    <div class="kpi-card"><div class="lbl">Saldo</div><div class="val">${fmtMoney(totalEntradas-totalSaidas)}</div></div>
  </div>`));

  const panel = el(`<div class="panel"><div class="panel-head"><h3>Lançamentos</h3></div></div>`);
  const addBtn = el(`<button class="btn btn-primary btn-sm">+ NOVO LANÇAMENTO</button>`);
  panel.querySelector('.panel-head').appendChild(addBtn);
  addBtn.onclick = ()=> openModal('Novo lançamento', [
    {key:'tipo', label:'Tipo', type:'select', options:[{value:'entrada',label:'Entrada'},{value:'saida',label:'Saída'}]},
    {key:'descricao', label:'Descrição', full:true}, {key:'valor', label:'Valor (R$)', type:'number', value:0}, {key:'data', label:'Data', type:'date', value:todayISO()},
  ], async (v)=>{
    const { error } = await supabase.from('lancamentos_financeiros').insert({ tenant_id: state.tenant.id, tipo:v.tipo, descricao:v.descricao||'—', valor:Number(v.valor)||0, data:v.data });
    if(error) return error.message;
    await loadAllData(); render();
  });

  if(state.lancamentos.length===0){ panel.appendChild(el(`<div class="empty">Nenhum lançamento ainda. Lançamentos de "entrada" são criados sozinhos quando você marca um agendamento como concluído.</div>`)); }
  else {
    const tbl = el(`<table><thead><tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Valor</th></tr></thead><tbody></tbody></table>`);
    const tbody = tbl.querySelector('tbody');
    state.lancamentos.forEach(l=>{ tbody.appendChild(el(`<tr><td>${l.data}</td><td>${l.descricao}</td><td><span class="badge ${l.tipo==='entrada'?'':'danger'}">${l.tipo}</span></td><td>${fmtMoney(l.valor)}</td></tr>`)); });
    panel.appendChild(tbl);
  }
  body.appendChild(panel);
}

// ================= LINK PÚBLICO =================
function renderLinkPublico(body){
  const panel = el(`<div class="panel"></div>`);
  panel.appendChild(el(`<div class="panel-head"><h3>Seu link de agendamento público</h3></div>`));
  const publicPageUrl = `${location.origin}${location.pathname.replace(/[^/]+$/,'')}public-agendar.html?slug=${state.tenant.slug}`;
  const box = el(`<div class="link-box"><span class="url" id="pubUrl">${publicPageUrl}</span>
    <div style="display:flex; gap:10px;"><button class="btn btn-outline btn-sm" id="copyBtn">copiar link</button></div></div>`);
  panel.appendChild(box);
  panel.appendChild(el(`<p style="color:var(--muted); font-size:13.5px; margin-top:16px;">Esse link abre a página pública <span class="mono">public-agendar.html</span> (publique ela junto com esse painel) — o cliente escolhe serviço e horário e agenda sem precisar de login.</p>`));
  body.appendChild(panel);
  box.querySelector('#copyBtn').onclick = ()=>{ navigator.clipboard?.writeText(publicPageUrl); alert('Link copiado!'); };
}

// ================= CONFIGURAÇÕES =================
function renderConfiguracoes(body){
  const panel = el(`<div class="panel"></div>`);
  panel.appendChild(el(`<div class="panel-head"><h3>Dados da conta</h3></div>`));
  const form = el(`<div class="form-grid">
    <div class="field"><label>Nome da barbearia</label><input id="cfgNome" value="${state.tenant.nome}"></div>
    <div class="field"><label>Slug (link público)</label><input id="cfgSlug" value="${state.tenant.slug}"></div>
  </div>`);
  panel.appendChild(form);
  const saveBtn = el(`<button class="btn btn-primary btn-sm" style="margin-top:16px;">SALVAR</button>`);
  saveBtn.onclick = async ()=>{
    const nome = document.getElementById('cfgNome').value.trim() || state.tenant.nome;
    const slug = document.getElementById('cfgSlug').value.trim() || state.tenant.slug;
    const { error } = await supabase.from('tenants').update({ nome, slug }).eq('id', state.tenant.id);
    if(error){ alert(error.message); return; }
    await loadTenant(); render();
  };
  panel.appendChild(saveBtn);
  body.appendChild(panel);

  const planoPanel = el(`<div class="panel"></div>`);
  planoPanel.appendChild(el(`<div class="panel-head"><h3>Plano e cobrança</h3></div>`));
  planoPanel.appendChild(el(`<p style="color:var(--muted); font-size:14px; margin:0 0 14px;">Status atual: <strong style="color:var(--gold-bright);">${state.tenant.status}</strong> — ${state.agendamentos.length}/${state.tenant.trial_limit} agendamentos usados no teste grátis.</p>`));
  const greennBtn = el(`<button class="btn btn-danger btn-sm">ASSINAR VIA GREENN</button>`);
  greennBtn.onclick = greennExplain;
  planoPanel.appendChild(greennBtn);
  body.appendChild(planoPanel);
}

boot();
</script>
